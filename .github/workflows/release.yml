name: Release
on:
  push:
    branches: [main]
concurrency:
  group: main-push-writes
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version, tag locally (no-op if no releasable commits)
        run: uv run semantic-release version --commit --tag --changelog --no-push --no-vcs-release
      - name: Push tag and land the bump commit via auto-merged PR (main is protected, can't push directly)
        run: |
          tag=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -n "$tag" ]; then
            git push origin "$tag"
            branch="chore/release-${tag}"
            git checkout -b "$branch"
            git push origin "$branch"
            gh pr create --base main --head "$branch" --title "chore(release): ${tag}" --body "Automated release ${tag}."
            gh pr merge "$branch" --auto --merge
            gh release create "$tag" --generate-notes
          fi

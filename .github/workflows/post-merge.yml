name: Post-merge (release + coverage badge)
on:
  push:
    branches: [main]
concurrency:
  group: main-push-writes
  cancel-in-progress: false
jobs:
  post-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      POSTGRES_HOST: localhost
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: 5432
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # --- Release (bump version, tag, publish GitHub release) ---
      - name: Bump version, tag locally (no-op if no releasable commits)
        run: uv run semantic-release version --commit --tag --changelog --no-push --no-vcs-release
      - name: Push tag and land the bump commit via auto-merged PR (main is protected, can't push directly)
        run: |
          tag=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -n "$tag" ]; then
            git push origin "$tag"
            branch="chore/release-${tag}"
            git checkout -b "$branch"
            git push origin "$branch"
            gh pr create --base main --head "$branch" --title "chore(release): ${tag}" --body "Automated release ${tag}."
            gh pr merge "$branch" --auto --merge
            gh release create "$tag" --generate-notes
            git checkout main
          fi

      # --- Coverage badge + baseline ---
      - name: Resolve merged PR's CI run
        id: run
        continue-on-error: true
        run: |
          pr_number=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number')
          head_sha=$(gh pr view "$pr_number" --json headRefOid --jq '.headRefOid')
          run_id=$(gh run list --workflow=ci.yml --commit "$head_sha" --json databaseId,conclusion --jq '[.[] | select(.conclusion=="success")][0].databaseId')
          test -n "$run_id" && [ "$run_id" != "null" ]
          echo "id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Download coverage data from that run (skip re-running tests)
        id: download
        if: steps.run.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-data
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
      - name: Run tests to generate coverage data (fallback — PR run/artifact unavailable)
        if: steps.download.outcome != 'success'
        run: |
          docker run -d --name coverage-badge-postgres \
            -e POSTGRES_USER="$POSTGRES_USER" -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD" -e POSTGRES_DB="$POSTGRES_DB" \
            -p 5432:5432 postgres:17-alpine
          until docker exec coverage-badge-postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 1; done
          docker run -d --name coverage-badge-redis -p 6379:6379 redis:7-alpine
          until docker exec coverage-badge-redis redis-cli ping | grep -q PONG; do sleep 1; done
          printf 'POSTGRES_HOST=%s\n' "$POSTGRES_HOST" >> .env
          printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER" >> .env
          printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" >> .env
          printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB" >> .env
          printf 'POSTGRES_PORT=%s\n' "$POSTGRES_PORT" >> .env
          task alembic-upgrade
          task test
      - name: Update coverage badge and baseline via auto-merged PR
        run: |
          task coverage-badge
          task coverage-update-baseline
          if ! git diff --quiet -- coverage.svg .coverage-baseline; then
            branch="chore/coverage-badge-update-${{ github.run_id }}"
            git checkout -b "$branch"
            git add coverage.svg .coverage-baseline
            git commit -m "chore(coverage): update coverage badge and baseline"
            git push origin "$branch"
            gh pr create --base main --head "$branch" --title "chore(coverage): update coverage badge and baseline" --body "Automated coverage badge/baseline update."
            gh pr merge "$branch" --auto --squash
          fi

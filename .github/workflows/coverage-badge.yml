name: Coverage badge
on:
  push:
    branches: [main]
jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Resolve merged PR's CI run
        id: run
        run: |
          pr_number=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number')
          head_sha=$(gh pr view "$pr_number" --json headRefOid --jq '.headRefOid')
          run_id=$(gh run list --workflow=ci.yml --commit "$head_sha" --json databaseId,conclusion --jq '[.[] | select(.conclusion=="success")][0].databaseId')
          echo "id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Download coverage data from that run (skip re-running tests)
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
      - name: Update coverage badge and baseline
        run: |
          task coverage-badge
          task coverage-update-baseline
          if ! git diff --quiet -- coverage.svg .coverage-baseline; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add coverage.svg .coverage-baseline
            git commit -m "chore(coverage): update coverage badge and baseline [skip ci]"
            git push
          fi

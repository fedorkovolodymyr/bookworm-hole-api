name: Coverage badge
on:
  push:
    branches: [main]
jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: 5432
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" --health-interval 2s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Configure environment
        run: |
          printf 'POSTGRES_HOST=%s\n' "$POSTGRES_HOST" >> .env
          printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER" >> .env
          printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" >> .env
          printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB" >> .env
          printf 'POSTGRES_PORT=%s\n' "$POSTGRES_PORT" >> .env
      - name: Apply migrations
        run: task alembic-upgrade
      - name: Test (generates coverage data for badge)
        run: task test
      - name: Update coverage badge and baseline
        run: |
          task coverage-badge
          task coverage-update-baseline
          if ! git diff --quiet -- coverage.svg .coverage-baseline; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add coverage.svg .coverage-baseline
            git commit -m "chore(coverage): update coverage badge and baseline [skip ci]"
            git push
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_USER: bookwormhole
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: bookwormhole
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookwormhole -d bookwormhole"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task install

      - name: Configure environment
        run: |
          printf 'POSTGRES_HOST=localhost\n' >> .env
          printf 'POSTGRES_USER=bookwormhole\n' >> .env
          printf 'POSTGRES_PASSWORD=secretpassword\n' >> .env
          printf 'POSTGRES_DB=bookwormhole\n' >> .env
          printf 'POSTGRES_PORT=5432\n' >> .env

      - name: Apply migrations
        run: task alembic-upgrade

      - name: Lint (ruff + pyright)
        run: task lint

      - name: Test
        run: task test

      - name: Pre-commit (full hook set, catches skipped local --no-verify)
        run: task precommit

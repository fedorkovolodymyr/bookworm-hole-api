name: CI
on:
  push:
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Lint (ruff + pyright)
        run: task lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: 5432
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" --health-interval 2s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Configure environment
        run: |
          printf 'POSTGRES_HOST=%s\n' "$POSTGRES_HOST" >> .env
          printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER" >> .env
          printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" >> .env
          printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB" >> .env
          printf 'POSTGRES_PORT=%s\n' "$POSTGRES_PORT" >> .env
      - name: Apply migrations
        run: task alembic-upgrade
      - name: Test
        run: task test | tee test-output.txt
      - name: Coverage summary
        if: always()
        run: |
          echo '### Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          awk '/^Name /,0' test-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          task coverage-badge
          if ! git diff --quiet -- coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add coverage.svg
            git commit -m "chore(coverage): update coverage badge [skip ci]"
            git push
          fi

  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: precommit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Pre-commit (formatting hooks only — ruff/pyright covered by the lint job)
        run: task precommit
        env:
          SKIP: task-format,task-lint

  release:
    needs: [lint, test, precommit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Install dependencies
        run: task install
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release (bump version, tag, publish GitHub release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task release

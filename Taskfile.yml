version: "3"

set: [errexit, pipefail, nounset]

vars:
  UV: uv
  UNVICORN: "uvicorn app.main:app"
  DC: "docker compose"

tasks:

  uv:
    desc: Run any uv command (advanced/manual use)
    cmd: "{{.UV}} {{.CLI_ARGS}}"

  install:
    desc: Install dependencies
    cmds:
      - task: uv
        vars:
          CLI_ARGS: "sync {{.CLI_ARGS}}"

  run:
    desc: Run arbitrary command via uv (default)
    aliases: [exec]
    cmd: "{{.UV}} run {{.UNVICORN}} {{.CLI_ARGS}}"

  dev:
    desc: Run FastAPI app locally with Docker PostgreSQL (uses .env.local)
    dotenv: [".env.local"]
    cmds:
      - echo "Starting API locally → postgresql://localhost:5432"
      - task: run
        vars: { CLI_ARGS: "--reload {{.CLI_ARGS}}" }

  format:
    desc: Format all (imports + code)
    cmds:
      - "{{.UV}} run ruff check --select I --fix {{.CLI_ARGS}}"
      - "{{.UV}} run ruff format {{.CLI_ARGS}}"

  lint:
    desc: Lint all (ruff + types)
    cmds:
      - "{{.UV}} run ruff check {{.CLI_ARGS}}"
      - "{{.UV}} run pyright {{.CLI_ARGS}}"

  lint-format:
    desc: Format and fix all issues
    cmds:
      - task: format
      - task: lint

  docker-compose:
    desc: Docker-compose services
    dotenv: [".env.docker"]
    cmd: "{{.DC}} {{.CLI_ARGS}}"

  docker-compose-up:
    desc: Start all docker-compose services
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "up -d {{.CLI_ARGS}}"

  docker-compose-down:
    desc: Stop docker-compose services
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "down {{.CLI_ARGS}}"

  docker-compose-logs:
    desc: View docker-compose logs
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "logs -f {{.CLI_ARGS}}"

  docker-compose-postgres:
    desc: Start only PostgreSQL service
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "up -d postgres {{.CLI_ARGS}}"


  docker-compose-api:
    desc: Start only API service
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "up -d api {{.CLI_ARGS}}"

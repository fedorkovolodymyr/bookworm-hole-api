version: "3"

set: [errexit, pipefail, nounset]

dotenv: [".env"]

vars:
  UV: uv
  UNVICORN: "uvicorn app.main:app"
  DC: "docker compose"

tasks:
  default:
    desc: Install dependencies
    cmds:
      - task: install

  _check-uv:
    internal: true
    preconditions:
      - sh: command -v {{.UV}}
        msg: uv not found — https://github.com/astral-sh/uv

  uv:
    desc: Run any uv command (advanced/manual use)
    deps: [_check-uv]
    cmd: "{{.UV}} {{.CLI_ARGS}}"

  install:
    desc: Install dependencies
    deps: [_check-uv]
    cmds:
      - task: uv
        vars:
          CLI_ARGS: "sync {{.CLI_ARGS}}"

  run:
    desc: Run arbitrary command via uv (default)
    aliases: [exec]
    deps: [_check-uv]
    cmd: "{{.UV}} run {{.UNVICORN}} {{.CLI_ARGS}}"

  dev:
    desc: Run FastAPI app with uvicorn and reload
    deps: [_check-uv]
    cmds:
      - task: run
        vars: { CLI_ARGS: "--reload {{.CLI_ARGS}}" }

  format:
    desc: Format all (imports + code)
    deps: [_check-uv]
    cmds:
      - "{{.UV}} run ruff check --select I --fix {{.CLI_ARGS}}"
      - "{{.UV}} run ruff format {{.CLI_ARGS}}"

  lint:
    desc: Lint all (ruff + types)
    deps: [_check-uv]
    cmds:
      - "{{.UV}} run ruff check {{.CLI_ARGS}}"
      - "{{.UV}} run pyright {{.CLI_ARGS}}"

  lint-format:
    desc: Format and fix all issues
    cmds:
      - task: format
      - task: "{{.UV}} run ruff check --fix {{.CLI_ARGS}}"

  docker-compose:
    desc: Docker-compose services
    cmd: "{{.DC}} {{.CLI_ARGS}}"

  docker-compose-up:
    desc: Start docker-compose services
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "up -d {{.CLI_ARGS}}"

  docker-compose-stop:
    desc: Stop docker-compose services
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "down {{.CLI_ARGS}}"

  docker-compose-logs:
    desc: Logs docker-compose services
    cmds:
      - task: docker-compose
        vars:
          CLI_ARGS: "logs -f {{.CLI_ARGS}}"
